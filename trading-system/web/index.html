<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易日志</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #080c12;
    --surface:   #11161e;
    --elevated:  #191f2a;
    --border:    #1e2733;
    --text:      #c8cdd4;
    --muted:     #5a6474;
    --amber:     #f0b429;
    --amber-dim: #b8871e;
    --up:        #ef4444;
    --down:      #22c55e;
    --up-bg:     rgba(239,68,68,0.12);
    --down-bg:   rgba(34,197,94,0.12);
    --radius:    6px;
    --font-data: 'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace;
    --font-ui:   'PingFang SC','HarmonyOS Sans','Microsoft YaHei',sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Top bar ──────────────────────────── */
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  .topbar .brand {
    font-size:15px; font-weight:600; letter-spacing:0.5px;
    color: var(--text);
  }
  .topbar .brand span { color: var(--amber); font-family: var(--font-data); }
  .topbar .meta {
    font-size:12px; color: var(--muted); font-family: var(--font-data);
  }

  .container { max-width: 1200px; margin:0 auto; padding:0 24px; }

  /* ── Hero: PnL chart ──────────────────── */
  .hero {
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 20px 12px;
  }
  .hero-header {
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom: 8px;
  }
  .hero-header h2 {
    font-size:13px; font-weight:500; color: var(--muted);
    text-transform:uppercase; letter-spacing:1px;
  }
  .hero-header .cum-pnl {
    font-family: var(--font-data); font-size: 24px; font-weight: 600;
  }
  .hero-header .cum-pnl.up   { color: var(--up); }
  .hero-header .cum-pnl.down { color: var(--down); }
  #pnlChart { width:100%; height:260px; }

  /* ── Quick stats ──────────────────────── */
  .quick-stats {
    display:grid; grid-template-columns: repeat(4,1fr); gap:1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-top: 16px;
    overflow:hidden;
  }
  .quick-stats .qs {
    background: var(--surface);
    padding: 14px 18px;
    text-align:center;
  }
  .quick-stats .qs .val {
    font-family: var(--font-data); font-size:22px; font-weight:600;
    color: var(--text);
  }
  .quick-stats .qs .lbl {
    font-size:11px; color: var(--muted);
    text-transform:uppercase; letter-spacing:0.8px; margin-top:2px;
  }

  /* ── Two-column main ──────────────────── */
  .main-grid {
    display:grid; grid-template-columns: 1fr 1.4fr; gap:16px;
    margin-top: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card h2 {
    font-size:13px; font-weight:500; color: var(--muted);
    text-transform:uppercase; letter-spacing:1px;
    margin-bottom: 14px;
  }

  /* ── Form ─────────────────────────────── */
  #tradeForm {
    display:flex; flex-direction:column; gap:10px;
  }
  .form-row {
    display:grid; grid-template-columns: 1fr 1fr; gap:10px;
  }
  .form-row.three {
    grid-template-columns: 1fr 1fr 1fr;
  }
  #tradeForm input, #tradeForm select {
    width:100%;
    padding: 8px 10px;
    font-size:13px; font-family: var(--font-ui);
    background: var(--elevated);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    outline:none;
    transition: border-color 0.15s;
  }
  #tradeForm input:focus, #tradeForm select:focus {
    border-color: var(--amber-dim);
  }
  #tradeForm input::placeholder { color: var(--muted); }
  #tradeForm select { cursor:pointer; }

  #tradeForm button {
    padding: 9px 0;
    font-size:13px; font-weight:600; font-family: var(--font-ui);
    background: var(--amber);
    color: var(--bg);
    border:none; border-radius: 4px;
    cursor:pointer;
    letter-spacing:0.5px;
    transition: background 0.15s;
  }
  #tradeForm button:hover { background: #f5c04a; }

  /* ── Table ────────────────────────────── */
  .table-wrap { max-height: 360px; overflow-y:auto; }
  .table-wrap::-webkit-scrollbar { width:4px; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius:2px; }

  table { width:100%; border-collapse:collapse; font-size:12px; }
  th {
    position:sticky; top:0; background: var(--surface);
    padding: 8px 8px; text-align:left;
    font-weight:500; color: var(--muted);
    font-size:11px; text-transform:uppercase; letter-spacing:0.5px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 7px 8px;
    border-bottom: 1px solid rgba(30,39,51,0.5);
    font-family: var(--font-data); font-size:12px;
  }
  tr:last-child td { border-bottom:none; }

  .tag {
    display:inline-block; padding:2px 8px; border-radius:3px;
    font-size:11px; font-weight:500;
  }
  .tag-buy  { background: var(--down-bg); color: var(--down); }
  .tag-sell { background: var(--up-bg);   color: var(--up); }

  .pnl-up   { color: var(--up); }
  .pnl-down { color: var(--down); }

  /* ── Positions (if any) ───────────────── */
  .positions-bar {
    display:flex; gap:12px; flex-wrap:wrap;
    margin-top: 16px; padding-bottom: 24px;
  }
  .pos-tag {
    font-size:12px; padding:4px 10px;
    background: var(--elevated);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--font-data);
  }
  .pos-tag .code { color: var(--amber); }

  /* ── Responsive ───────────────────────── */
  @media (max-width: 768px) {
    .container { padding:0 12px; }
    .main-grid { grid-template-columns:1fr; }
    .quick-stats { grid-template-columns: repeat(2,1fr); }
    #pnlChart { height:180px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span>//</span> 交易日志</div>
  <div class="meta" id="metaTime"></div>
</div>

<div class="container">

  <!-- Hero: PnL chart -->
  <div class="hero">
    <div class="hero-header">
      <h2>累计盈亏曲线</h2>
      <div class="cum-pnl" id="heroPnl">—</div>
    </div>
    <canvas id="pnlChart"></canvas>
  </div>

  <!-- Quick stats -->
  <div class="quick-stats" id="statsRow"></div>

  <!-- Main grid -->
  <div class="main-grid">
    <div class="card">
      <h2>录入交易</h2>
      <form id="tradeForm">
        <div class="form-row">
          <input name="code" placeholder="代码 600900" required>
          <input name="price" type="number" step="0.01" placeholder="价格 26.50" required>
        </div>
        <div class="form-row">
          <select name="direction" required>
            <option value="buy">买入</option>
            <option value="sell">卖出</option>
          </select>
          <input name="trade_time" type="text" placeholder="2026-06-24 14:30" required>
        </div>
        <div class="form-row three">
          <select name="position"><option value="">仓位</option><option>轻仓</option><option>半仓</option><option>满仓</option><option>试错</option></select>
          <select name="strategy"><option value="">策略</option><option>ABC浪</option><option>量能突破</option><option>板块跟风</option><option>情绪化</option></select>
          <select name="emotion"><option value="">情绪</option><option>正常</option><option>冲动</option><option>止损</option><option>止盈</option><option>补仓</option><option>割肉</option><option>追高</option></select>
        </div>
        <button type="submit">提交</button>
      </form>
    </div>

    <div class="card">
      <h2>最近交易</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>时间</th><th>代码</th><th>名称</th><th>方向</th><th>价格</th><th>盈亏</th><th>策略</th></tr></thead>
          <tbody id="tradeList"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Positions -->
  <div class="positions-bar" id="positionsBar"></div>

</div>

<script src="app.js"></script>
</body>
</html>
